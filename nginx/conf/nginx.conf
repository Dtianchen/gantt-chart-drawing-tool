# Gantt Tool - Nginx Configuration
# 便携版配置：直接托管 dist/ 目录的静态文件

worker_processes  1;
error_log logs/error.log;
pid       logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    include       mime.types;
    default_type  text/html;

    # 日志精简（便携版不需要详细日志）
    access_log off;
    sendfile on;
    keepalive_timeout 30;
    
    # Gzip 压缩
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    server {
        listen      8080;
        server_name localhost;

        # 指向构建产物目录
        root ../dist;   # 相对于 nginx/ 目录
        index index.html;

        # SPA 路由支持
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 静态资源长期缓存
        location /assets/ {
            expires max;
            add_header Cache-Control "public, immutable";
        }

        # 禁止隐藏文件访问
        location ~ /\. {
            deny all;
        }
    }
}
